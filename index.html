<body>

    <div class="app-container">
        
        <!-- Top Bar: Logo -->
        <header class="top-header" style="justify-content: flex-start; padding: 20px 20px 10px;">
            <img src="https://b.zmtcdn.com/data/edition_assets/17466982242413.svg" alt="District Logo" style="height: 28px;">
        </header>

        <!-- Search Bar -->
        <div class="search-section">
            <div class="search-box">
                <svg viewBox="0 0 24 24" fill="none" stroke="#999" stroke-width="2" class="search-icon">
                    <circle cx="11" cy="11" r="8"></circle>
                    <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                </svg>
                <input type="text" placeholder="Search for 'Delhi Capitals'">
            </div>
        </div>


        <!-- Hero Banner -->
        <div class="hero-banner" style="background: url('https://media.insider.in/image/upload/c_crop,g_custom/v1774013590/j6f2eofwpfzqwdgehsyj.png') center/cover no-repeat;">
            <!-- Removed text content, now just the banner image -->
        </div>

        <!-- Exclusive Partner Section -->
        <div class="section-divider">
            <span class="line"></span>
            <span class="text">EXCLUSIVE TICKETING PARTNER FOR</span>
            <span class="line"></span>
        </div>
        
        <div class="partner-logos" id="partnerLogosContainer">
            <!-- Dynamically injected partner logos -->
        </div>

        <!-- Tickets On Sale Section -->
        <div class="section-divider">
            <span class="line"></span>
            <span class="text">TICKETS ON SALE</span>
            <span class="line"></span>
        </div>

        <div class="match-list" id="matchListContainer">
            <!-- Matches will be dynamically injected here via JS -->
        </div>

        <!-- Schedule Button -->
        <div class="schedule-btn-container">
            <button class="btn-full-schedule">
                <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" class="icon-calendar">
                    <rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect>
                    <line x1="16" y1="2" x2="16" y2="6"></line>
                    <line x1="8" y1="2" x2="8" y2="6"></line>
                    <line x1="3" y1="10" x2="21" y2="10"></line>
                </svg>
                <span>TATA IPL 2026 schedule</span>
                <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" class="chevron-right">
                    <polyline points="9 18 15 12 9 6"></polyline>
                </svg>
            </button>
        </div>

        <!-- Teams Section -->
        <div class="section-divider">
            <span class="line"></span>
            <span class="text">TEAMS</span>
            <span class="line"></span>
        </div>

        <div class="teams-list" id="teamsListContainer">
            <!-- Dynamically injected teams -->
        </div>

        <!-- Disclaimer -->
        <div class="section-divider">
            <span class="line"></span>
            <span class="text">DISCLAIMER</span>
            <span class="line"></span>
        </div>

        <div class="disclaimer-text">
            All proprietary elements such as names, logos etc used on this page are the property of the Indian Premier League and their respective teams.
        </div>

    </div>
