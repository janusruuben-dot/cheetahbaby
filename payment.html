<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Make Payment | Pavilion</title>
    <meta name="description" content="Complete your IPL ticket payment">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="payment.css">
</head>

<body>

    <div class="app-container payment-page">

        <!-- Header -->
        <header class="top-header">
            <a href="review.html" class="back-btn">
                <svg viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="white" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round">
                    <line x1="19" y1="12" x2="5" y2="12"></line>
                    <polyline points="12 19 5 12 12 5"></polyline>
                </svg>
            </a>
            <h1 class="header-title">Make Payment</h1>
        </header>

        <!-- Amount Display -->
        <div class="amount-header">
            <div class="amt-label">Total Payable</div>
            <div class="amt-val" id="dynPayAmount">₹0</div>
            <div class="amt-sub" id="dynPaySeats">---</div>
        </div>

        <!-- Timer Chip -->
        <div class="timer-chip">
            <div class="timer-dot"></div>
            <span>Complete payment in <strong id="countdown">05:00</strong></span>
        </div>

        <!-- QR Card -->
        <div class="card qr-card">
            <div class="qr-card-title">Scan & Pay</div>
            <div class="qr-box" id="qrBox">
                <div class="qr-loading" id="qrLoading">
                    <div class="qr-spinner"></div>
                    <span>Generating QR...</span>
                </div>
                <img id="qrImage" class="qr-img" alt="UPI QR Code" style="display:none;">
            </div>
            <div class="qr-sub" id="qrSub">Scan with any UPI app to pay</div>
            <div class="upi-apps-row">
                <img src="https://uxwing.com/wp-content/themes/uxwing/download/brands-and-social-media/google-pay-icon.png"
                    alt="GPay" class="upi-app-icon">
                <img src="https://e7.pngegg.com/pngimages/332/615/png-clipart-phonepe-india-unified-payments-interface-india-purple-violet.png"
                    alt="PhonePe" class="upi-app-icon">
                <img src="https://stagvinecip01.blob.core.windows.net/stc-gvine-blob-centralindia-prod-001-django/images/company/97078ceb-517d-4e92-96b2-5bf65bf15f95/profile/20231121070850.png"
                    alt="Paytm" class="upi-app-icon">
            </div>
        </div>

        <!-- OR Divider -->
        <div class="section-divider">
            <span class="line"></span>
            <span class="text">OR PAY USING UPI ID</span>
            <span class="line"></span>
        </div>

        <!-- UPI ID Copy Card -->
        <div class="card upi-card">
            <div class="upi-id-row">
                <div class="upi-id-left">
                    <div class="upi-icon-circle">
                        <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="white" stroke-width="2">
                            <rect x="2" y="5" width="20" height="14" rx="3"></rect>
                            <path d="M7 15l3-6 3 6"></path>
                            <path d="M15 9v6"></path>
                        </svg>
                    </div>
                    <div>
                        <div class="upi-label">UPI ID</div>
                        <div class="upi-id" id="upiIdDisplay">loading...</div>
                    </div>
                </div>
                <button class="btn-copy" id="btnCopy">
                    <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2">
                        <rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect>
                        <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path>
                    </svg>
                    <span>Copy</span>
                </button>
            </div>
        </div>

        <!-- Steps -->
        <div class="steps-card">
            <div class="step"><span class="step-num">1</span> Copy the UPI ID above</div>
            <div class="step"><span class="step-num">2</span> Open any UPI app & pay to this ID</div>
            <div class="step"><span class="step-num">3</span> Come back & confirm your payment</div>
        </div>

        <!-- Confirm Button -->
        <div class="action-container">
            <button class="btn-confirm-pay" id="btnCompleted">
                <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2.5">
                    <polyline points="20 6 9 17 4 12"></polyline>
                </svg>
                I have completed the payment
            </button>
        </div>

        <!-- Trust Strip -->
        <div class="pay-trust-strip">
            <div class="pt-pill"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="#34C759"
                    stroke-width="2.5">
                    <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
                    <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
                </svg> Secure</div>
            <div class="pt-pill"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="#60A5FA"
                    stroke-width="2.5">
                    <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"></path>
                </svg> PCI-DSS</div>
            <div class="pt-pill"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="#F8CB64"
                    stroke-width="2.5">
                    <polyline points="20 6 9 17 4 12"></polyline>
                </svg> Instant</div>
        </div>

        <div class="bottom-spacer"></div>
    </div>

    <script src="data.js"></script>
    <script src="payment.js"></script>
</body>

</html>
